name: Add Coupang disclosure to posts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update markdown files in posts safely
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          POSTS_DIR = Path("posts")
          md_files = sorted(POSTS_DIR.glob("*.md"))

          NOTICE_TEXT = "이 게시물은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다."
          NOTICE_HTML = (
              '<p style="color:#d60000; font-size:1.15em; font-weight:700; margin:16px 0 16px 0;">'
              + NOTICE_TEXT +
              '</p>'
          )

          # 본문 안 기존 고지문 제거용
          DISCLOSURE_PATTERNS = [
              r'<p[^>]*>\s*이\s*(포스팅|게시물)은\s*쿠팡\s*파트너스\s*활동의\s*일환으로[,]?\s*(이에\s*따른\s*)?일정액의\s*수수료를\s*제공받습니다\.?\s*</p>\s*',
              r'\*?\s*이\s*포스팅은\s*쿠팡\s*파트너스\s*활동의\s*일환으로[,]?\s*(이에\s*따른\s*)?일정액의\s*수수료를\s*제공받습니다\.?\s*\*?\s*',
              r'\*?\s*이\s*게시물은\s*쿠팡\s*파트너스\s*활동의\s*일환으로[,]?\s*(이에\s*따른\s*)?일정액의\s*수수료를\s*제공받습니다\.?\s*\*?\s*',
              r'\*?\s*쿠팡\s*파트너스\s*활동을\s*통해\s*일정액의\s*수수료를\s*제공받습니다\.?\s*\*?\s*',
              r'\*?\s*소정의\s*수수료를\s*지급받을\s*수\s*있음\.?\s*\*?\s*',
          ]

          def split_frontmatter(text: str):
              # 프론트매터가 있으면 정확히 보존하고, 본문만 따로 분리
              if not text.startswith('---\n'):
                  return '', text

              second = text.find('\n---\n', 4)
              if second == -1:
                  return '', text

              second_end = second + len('\n---\n')
              frontmatter = text[:second_end]
              body = text[second_end:]
              return frontmatter, body

          def clean_body(body: str) -> str:
              cleaned = body

              for pattern in DISCLOSURE_PATTERNS:
                  cleaned = re.sub(pattern, '', cleaned, flags=re.IGNORECASE)

              # 맨 앞 공백 줄만 정리
              cleaned = cleaned.lstrip('\n')

              # 과도한 빈 줄만 살짝 정리
              cleaned = re.sub(r'\n{4,}', '\n\n\n', cleaned)

              return cleaned

          def add_notice_to_body(body: str) -> str:
              if NOTICE_TEXT in body:
                  return body

              body = body.lstrip('\n')
              return NOTICE_HTML + '\n\n' + body

          if not POSTS_DIR.exists():
              raise SystemExit("posts 폴더를 찾을 수 없습니다.")

          if not md_files:
              raise SystemExit("posts 폴더 안에 .md 파일이 없습니다.")

          print(f"posts/*.md files found: {len(md_files)}")

          changed_files = []

          for md_file in md_files:
              original = md_file.read_text(encoding="utf-8")

              frontmatter, body = split_frontmatter(original)

              # 프론트매터가 없는 파일은 건너뜀
              if not frontmatter:
                  print(f"[SKIP - no frontmatter] {md_file.name}")
                  continue

              cleaned_body = clean_body(body)
              updated_body = add_notice_to_body(cleaned_body)

              # 프론트매터는 절대 수정하지 않음
              updated = frontmatter + updated_body

              # 파일 끝 줄바꿈 1개로 통일
              updated = updated.rstrip() + '\n'

              if original != updated:
                  md_file.write_text(updated, encoding="utf-8")
                  changed_files.append(md_file.name)

          print(f"changed files: {len(changed_files)}")
          for name in changed_files:
              print(f" - {name}")
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add posts/*.md
          git status

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Safely add Coupang disclosure to posts body only"
            git push
          fi
