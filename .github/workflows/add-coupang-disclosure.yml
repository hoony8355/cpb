name: Add Coupang disclosure to posts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update markdown files in posts
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          POSTS_DIR = Path("posts")
          md_files = list(POSTS_DIR.glob("*.md"))

          NOTICE_TEXT = "이 게시물은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다."
          NOTICE_HTML = (
              '<p style="color:#d60000; font-size:1.15em; font-weight:700; margin:0 0 16px 0;">'
              + NOTICE_TEXT +
              '</p>'
          )

          DISCLOSURE_PATTERNS = [
              r"\*?\s*이\s*포스팅은\s*쿠팡\s*파트너스\s*활동의\s*일환으로[,]?\s*(이에\s*따른\s*)?일정액의\s*수수료를\s*제공받습니다\.?\s*\*?",
              r"\*?\s*이\s*게시물은\s*쿠팡\s*파트너스\s*활동의\s*일환으로[,]?\s*(이에\s*따른\s*)?일정액의\s*수수료를\s*제공받습니다\.?\s*\*?",
              r"\*?\s*쿠팡\s*파트너스\s*활동을\s*통해\s*일정액의\s*수수료를\s*제공받습니다\.?\s*\*?",
              r"\*?\s*소정의\s*수수료를\s*지급받을\s*수\s*있음\.?\s*\*?",
          ]

          def remove_existing_disclosures(text: str) -> str:
              # 기존 HTML 고지 제거
              text = re.sub(
                  r'<p[^>]*>\s*이\s*(포스팅|게시물)은\s*쿠팡\s*파트너스\s*활동의\s*일환으로[,]?\s*(이에\s*따른\s*)?일정액의\s*수수료를\s*제공받습니다\.?\s*</p>\s*',
                  '',
                  text,
                  flags=re.IGNORECASE
              )

              # 일반 텍스트/기울임꼴 고지 제거
              for pattern in DISCLOSURE_PATTERNS:
                  text = re.sub(pattern, '', text, flags=re.IGNORECASE)

              # 고지문 때문에 남은 단독 구분선 정리
              text = re.sub(r'\n---\n(?=\s*\n|[가-힣A-Za-z0-9#<])', '\n', text)

              # 빈 줄 정리
              text = re.sub(r'\n{3,}', '\n\n', text).strip() + '\n'
              return text

          def insert_notice_below_frontmatter(text: str) -> str:
              if NOTICE_HTML in text:
                  return text

              fm_match = re.match(r'^---\n.*?\n---\n*', text, flags=re.DOTALL)
              if fm_match:
                  frontmatter = fm_match.group(0).rstrip() + '\n\n'
                  body = text[fm_match.end():].lstrip()
                  return frontmatter + NOTICE_HTML + '\n\n' + body

              return NOTICE_HTML + '\n\n' + text.lstrip()

          if not POSTS_DIR.exists():
              raise SystemExit("posts 폴더를 찾을 수 없습니다.")

          print(f"posts/*.md files found: {len(md_files)}")
          if not md_files:
              raise SystemExit("posts 폴더 안에 .md 파일이 없습니다.")

          changed_files = []

          for md_file in md_files:
              original = md_file.read_text(encoding="utf-8")

              updated = remove_existing_disclosures(original)
              updated = insert_notice_below_frontmatter(updated)
              updated = updated.rstrip() + '\n'

              if original != updated:
                  md_file.write_text(updated, encoding="utf-8")
                  changed_files.append(md_file.name)

          print(f"changed files: {len(changed_files)}")
          for name in changed_files:
              print(f" - {name}")
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add posts/*.md
          git status

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add Coupang disclosure to posts"
            git push
          fi
